name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: ty check
        run: uv run ty check

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      # Export all dependencies (including dev) to a requirements file so
      # pip-audit can scan them without needing to install them into its own env.
      - name: Export dependencies
        run: uv export --no-hashes --all-groups --format requirements-txt -o requirements-audit.txt

      # pip-audit (https://github.com/pypa/pip-audit) is a free, open-source
      # tool from PyPA that checks for known CVEs via the OSV / PyPI advisory DBs.
      - name: Scan for vulnerabilities with pip-audit
        run: uvx pip-audit -r requirements-audit.txt

  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: uv run python -m pytest tests/ --cov=. --cov-report=xml --cov-report=html --junitxml=test_results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: error
