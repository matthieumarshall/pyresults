name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: ty check
        run: uv run ty check --python .venv

  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required to upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      # osv-scanner (https://github.com/google/osv-scanner) is a free, open-source
      # tool from Google that checks for known CVEs via the OSV advisory DB.
      # It scans uv.lock directly and outputs SARIF natively.
      # --continue-on-error so the SARIF upload step always runs even when
      # vulnerabilities are found (osv-scanner exits non-zero in that case).
      - name: Install osv-scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: Scan for vulnerabilities with osv-scanner
        run: ./osv-scanner --lockfile uv.lock --format sarif --output osv-scanner.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-scanner.sarif
          category: osv-scanner

  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: uv run python -m pytest tests/ --cov=pyresults --cov-report=xml --cov-report=html --junitxml=test_results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: error
